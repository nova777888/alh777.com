<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Nova Exchange</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>??</text></svg>" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f8fafc;
      font-family: 'Montserrat', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      max-width: 420px;
      width: 100%;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #eef2f4;
      border-top-color: #0a7b7b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo { font-size: 26px; font-weight: 700; color: #0a1c2f; margin-bottom: 12px; }
    .logo span { color: #0a7b7b; }
    .text { color: #4a6a78; font-size: 14px; line-height: 1.6; }
    .ref-badge {
      display: inline-block;
      background: #f0f7fa;
      color: #0a7b7b;
      font-weight: 700;
      font-size: 16px;
      padding: 8px 20px;
      border-radius: 40px;
      margin: 16px 0;
      border: 1.5px solid #0a7b7b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">NOVA<span>.</span></div>
    <div id="statusDisplay">
      <div class="spinner"></div>
      <div class="text">Preparing your registration...</div>
    </div>
  </div>
  <script>
    (function() {
      var ref = '';
      var match = location.search.match(/[?&]ref=([^&]*)/i);
      if (match) ref = match[1];

      // Store ref for the target page
      if (ref) {
        try { localStorage.setItem('nova_ref_code', ref); } catch(e) {}
        document.getElementById('statusDisplay').innerHTML =
          '<div class="ref-badge">Referral: ' + ref.toUpperCase() + '</div>' +
          '<div class="spinner"></div>' +
          '<div class="text">Welcome! Redirecting to registration...</div>';
      }

      // Redirect to Nigeria page - the registration modal will auto-open
      var target = '/countries/nigeria/Nigeria.html';
      if (ref) target += '?ref=' + encodeURIComponent(ref);
      setTimeout(function() { window.location.href = target; }, 800);
    })();
  </script>
</body>
</html>
