<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport">
  <meta content="yes" name="mobile-web-app-capable">
  <title>My Account · Nova Exchange</title>
  <meta name="description" content="Your Nova Exchange dashboard - profile, commissions, referrals.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>" type="image/svg+xml">
  <link rel="canonical" href="https://www.alh777.com/countries/nigeria/account.html">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fa;
      font-family: 'Montserrat', 'Inter', -apple-system, sans-serif;
      padding: 1.5rem 1rem;
      color: #1a2a3a;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    
    /* Header */
    header {
      border-bottom: 1px solid rgba(10,123,123,0.1);
      padding: 14px 0;
      background: white;
      margin-bottom: 1.5rem;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; color: #0a1c2f; text-decoration: none; }
    .logo span { color: #0a7b7b; }

    /* Cards */
    .dash-card {
      background: white;
      border-radius: 20px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      margin-bottom: 16px;
      border: 1px solid #edf2f4;
    }
    .dash-card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #1a2a3a;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid #f0f4f6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dash-card h2 .badge {
      background: #0a7b7b;
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Profile section */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .profile-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .profile-info h1 {
      font-size: 20px; font-weight: 700; color: #1a2a3a;
    }
    .profile-info .meta {
      font-size: 13px; color: #6a8a98;
      margin-top: 2px;
    }
    .profile-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .profile-details .item {
      background: #f8fafb;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .profile-details .item .label {
      font-size: 11px; font-weight: 600; color: #8aaeb9;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .profile-details .item .value {
      font-size: 14px; font-weight: 600; color: #1a2a3a;
      margin-top: 2px;
    }

    /* Commission overview - 3 column grid */
    .comm-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .comm-card {
      background: #f8fafb;
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
      border: 1px solid #edf2f4;
      cursor: pointer;
      transition: 0.2s;
    }
    .comm-card:hover { border-color: #0a7b7b; transform: translateY(-1px); }
    .comm-card .amount {
      font-size: 24px; font-weight: 800; color: #0a7b7b;
    }
    .comm-card .label {
      font-size: 12px; color: #6a8a98; font-weight: 500;
      margin-top: 4px;
    }
    .comm-card .sub-label {
      font-size: 11px; color: #8aaeb9; margin-top: 2px;
    }

    /* Today performance */
    .today-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .today-item {
      background: #f8fafb;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      border: 1px solid #edf2f4;
    }
    .today-item .amount {
      font-size: 20px; font-weight: 700;
    }
    .today-item .label {
      font-size: 12px; color: #6a8a98; margin-top: 4px;
    }
    .today-pos { color: #0a7b7b; }
    .today-neg { color: #d32f2f; }
    .today-neutral { color: #f39c12; }

    /* Transaction filters */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #dce4e8;
      background: white;
      color: #4a6a78;
      transition: 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: #0a7b7b; color: #0a7b7b; }
    .filter-btn.active { background: #0a7b7b; border-color: #0a7b7b; color: white; }

    /* Month accordion */
    .month-group {
      border: 1px solid #edf2f4;
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f8fafb;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: #1a2a3a;
      transition: 0.1s;
      user-select: none;
    }
    .month-header:hover { background: #f0f4f6; }
    .month-header .month-total { color: #0a7b7b; }
    .month-body { display: none; }
    .month-body.open { display: block; }

    /* Tables */
    .dash-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .dash-table th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 2px solid #edf2f4;
      color: #6a8a98;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
    }
    .dash-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0f4f6;
      color: #1a2a3a;
    }
    .dash-table tr:hover td { background: #f8fafb; }

    /* Status badges */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-success { background: #e8f8f0; color: #1abb9c; }
    .status-pending { background: #fff8e1; color: #f39c12; }
    .status-failed { background: #fde8e8; color: #d32f2f; }
    .status-processing { background: #ebf5fb; color: #3498db; }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 6px 12px;
      border: 1px solid #dce4e8;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .page-btn:hover { background: #f0f7fa; }
    .page-btn.active { background: #0a7b7b; color: white; border-color: #0a7b7b; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Upline card */
    .upline-card {
      background: linear-gradient(135deg, #f0f7fa, #eaf3f6);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid #dce8ec;
    }
    .upline-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .upline-info .name { font-weight: 700; font-size: 15px; color: #1a2a3a; }
    .upline-info .detail { font-size: 12px; color: #6a8a98; margin-top: 1px; }

    /* Settings */
    .settings-grid {
      display: grid;
      gap: 16px;
    }
    .settings-grid input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #dce4e8;
      border-radius: 10px;
      font-size: 14px;
      background: #f8fafc;
      font-family: inherit;
    }
    .settings-grid input:focus { border-color: #0a7b7b; outline: none; background: white; }
    .pw-fields { display: grid; gap: 10px; max-width: 400px; }
    .dash-btn {
      padding: 10px 20px;
      background: #0a7b7b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: 0.15s;
      white-space: nowrap;
    }
    .dash-btn:hover { background: #086868; }
    .dash-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .dash-btn-outline {
      background: transparent;
      border: 1.5px solid #0a7b7b;
      color: #0a7b7b;
    }
    .dash-btn-outline:hover { background: #f0f7fa; }

    /* Loading & empty states */
    .loading-state {
      text-align: center; padding: 30px; color: #8aaeb9; font-size: 14px;
    }
    .loading-state::before {
      content: ""; display: block; width: 32px; height: 32px;
      border: 3px solid #e2edf2; border-top-color: #0a7b7b;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center; padding: 24px; color: #8aaeb9; font-size: 14px;
    }
    .error-state {
      text-align: center; padding: 24px; color: #d32f2f; font-size: 14px;
    }

    /* Modal overlay (for commission detail popups) */
    .nova-modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .nova-modal {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .nova-modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
    .nova-modal .close-btn {
      float: right; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #8aaeb9;
    }
    .nova-modal .modal-item {
      padding: 8px 0; border-bottom: 1px solid #f0f4f6;
      display: flex; justify-content: space-between; font-size: 14px;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Mobile responsive */
    @media (max-width: 640px) {
      body { padding: 0.8rem 0.5rem; }
      .comm-grid { grid-template-columns: 1fr; }
      .today-grid { grid-template-columns: 1fr; }
      .profile-details { grid-template-columns: 1fr 1fr; }
      .dash-card { padding: 16px; border-radius: 16px; }
      .dash-table { font-size: 12px; }
      .dash-table th, .dash-table td { padding: 6px 6px; }
    }
    @media (max-width: 480px) {
      .profile-details { grid-template-columns: 1fr; }
      .comm-card .amount { font-size: 20px; }
    }

    /* Back link */
    .back-link { text-align: center; margin: 24px 0; }
    .back-link a { color: #6a8a98; font-size: 13px; text-decoration: none; }
    .back-link a:hover { color: #0a7b7b; }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <header>
    <div class="header-inner">
      <a href="./Nigeria.html" class="logo">NOVA<span>.</span></a>
      <div class="header-auth-right"></div>
    </div>
  </header>

  <!-- ===== 1. Profile Card ===== -->
  <div class="dash-card" id="profileSection">
    <h2>👤 Profile</h2>
    <div class="profile-header" id="profileHeader">
      <div class="loading-state">Loading profile...</div>
    </div>
    <div class="profile-details" id="profileDetails"></div>
  </div>

  <!-- ===== 2. Commission Overview ===== -->
  <div class="dash-card">
    <h2>💰 Commission Overview</h2>
    <div class="comm-grid" id="commissionGrid">
      <div class="loading-state" style="grid-column:1/-1;">Loading...</div>
    </div>
  </div>

  <!-- ===== 3. Today's Performance ===== -->
  <div class="dash-card">
    <h2>📊 Today's Performance</h2>
    <div id="todayContent">
      <div class="loading-state">Loading...</div>
    </div>
  </div>

  <!-- ===== 4. Transaction History ===== -->
  <div class="dash-card">
    <h2>📋 Transaction History</h2>
    <div class="filter-bar" id="txnFilterBar"></div>
    <div id="txnContent">
      <div class="loading-state">Loading transactions...</div>
    </div>
    <div class="pagination" id="txnPagination"></div>
  </div>

  <!-- ===== 5. Referral Performance ===== -->
  <div class="dash-card">
    <h2>👥 Referral Performance</h2>
    <!-- Upline info -->
    <div id="uplineSection" style="margin-bottom:14px;"></div>
    <!-- Downline stats bar -->
    <div id="downlineStatsBar" style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;font-size:13px;color:#6a8a98;"></div>
    <!-- Month filter for downlines -->
    <div class="filter-bar" id="dlMonthFilterBar"></div>
    <!-- Downline table -->
    <div id="downlineContent">
      <div class="loading-state">Loading downlines...</div>
    </div>
    <div class="pagination" id="dlPagination"></div>
  </div>

  <!-- ===== 6. Settings ===== -->
  <div class="dash-card">
    <h2>⚙️ Settings</h2>
    <div class="settings-grid">
      <!-- Referral Link -->
      <div style="margin-bottom:10px;">
        <div style="font-size:12px;font-weight:600;color:#6a8a98;margin-bottom:4px;">Your Referral Link</div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="refLinkDisplay" readonly />
          <button class="dash-btn" onclick="copyRefLink()">Copy</button>
        </div>
      </div>
      <!-- Bind Email -->
      <div style="border:1px solid #edf2f4;border-radius:12px;padding:16px;background:#fafcfd;">
        <div style="font-size:12px;font-weight:600;color:#6a8a98;margin-bottom:8px;">Bind Email</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
          <input type="email" id="accBindEmail" placeholder="Enter your email" style="flex:1;min-width:150px;">
          <button id="accSendBindCodeBtn" onclick="sendBindCode()" class="dash-btn dash-btn-outline">Send Code</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input type="text" id="accBindCode" placeholder="Enter 4-digit code" maxlength="4" style="flex:1;min-width:150px;">
          <button onclick="verifyBindEmail()" class="dash-btn">Confirm Bind</button>
        </div>
        <div id="bindMessage" style="margin-top:8px;font-size:13px;font-weight:500;"></div>
      </div>
      <!-- Change Password -->
      <div style="border:1px solid #edf2f4;border-radius:12px;padding:16px;background:#fafcfd;">
        <div style="font-size:12px;font-weight:600;color:#6a8a98;margin-bottom:8px;">Change Password</div>
        <div class="pw-fields">
          <div id="chgPhoneDisplay" style="font-size:13px;font-weight:600;color:#0a1c2f;margin-bottom:4px;"></div>
          <input type="password" id="chgOldPwd" placeholder="Current Password" />
          <input type="password" id="chgNewPwd" placeholder="New Password (min 6 chars)" />
          <input type="password" id="chgConfirmPwd" placeholder="Confirm new password" />
        </div>
        <button class="dash-btn" style="margin-top:10px;" onclick="changePassword()">Change Password</button>
        <div id="resetMessage" style="margin-top:8px;font-size:13px;font-weight:500;"></div>
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="./Nigeria.html">&larr; Back to Nova Exchange Nigeria</a>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/account.js"></script>
</body>
</html>
